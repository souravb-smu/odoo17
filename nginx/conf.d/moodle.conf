# ─── Moodle: training.esmos.internal (VPN only) ──────────────────────────────
# Access is restricted at the NSG level — only VPN clients reach this host.
# Nginx provides HTTP→HTTPS redirect and proxying.

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name training.esmos.internal;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

