# ─── Odoo: esmos.com ──────────────────────────────────────────────────────────
# HTTP → HTTPS redirect
server {
    listen 80;
    server_name esmos.com www.esmos.com helpdesk.esmos.com;

    # Let's Encrypt ACME challenge (used in Step 8)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

